name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and package release (${{ matrix.arch }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            dmg-name: Ironsmith.dmg
          - arch: x86_64
            dmg-name: Ironsmith_x86.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}

      - name: Install create-dmg
        run: npm install --global create-dmg

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" | /usr/bin/base64 -D > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"

      - name: Build release app
        run: |
          set -euo pipefail
          script/build.sh --release \
            --arch "${{ matrix.arch }}" \
            --version "${GITHUB_REF_NAME#v}" \
            --build-number "$GITHUB_RUN_NUMBER" \
            --supabase-url "${{ vars.IRONSMITH_SUPABASE_URL }}" \
            --supabase-publishable-key "${{ vars.IRONSMITH_SUPABASE_PUBLISHABLE_KEY }}" \
            --api-base-url "${{ vars.IRONSMITH_API_BASE_URL }}" \
            --sign-identity "${{ vars.DEVELOPER_ID_SIGN_IDENTITY }}"

      - name: Package and notarize DMG
        run: |
          set -euo pipefail
          script/package.sh \
            "dist/release-${{ matrix.arch }}/Ironsmith.app" \
            --output "dist/release-${{ matrix.arch }}/${{ matrix.dmg-name }}" \
            --notary-key "$RUNNER_TEMP/AuthKey.p8" \
            --notary-key-id "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --notary-issuer-id "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v5
        with:
          name: ironsmith-${{ matrix.arch }}-dmg
          path: dist/release-${{ matrix.arch }}/${{ matrix.dmg-name }}
          if-no-files-found: error

  release:
    name: Create draft GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          name: ${{ github.ref_name }}
          files: release-assets/**/*.dmg
          fail_on_unmatched_files: true
          overwrite_files: true
